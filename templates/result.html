<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{{ title }} - SubConvert Manager</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <h1>{{ title }}</h1>
        <div class="sub">来源：{{ source }} ｜ 解析数量：{{ count }}</div>
      </div>
      <div class="top-actions">
        <button class="btn" type="button" data-density-toggle aria-label="切换页面密度"><span data-density-label>切换为紧凑</span></button>
        <a class="btn" href="/convert">继续转换</a>
        <a class="btn" href="/">返回管理</a>
      </div>
    </div>

    <div class="card state-block success" style="margin-bottom:12px;">
      <div class="state-title">转换成功</div>
      <div class="hint">可直接复制结果到客户端，或按需保存本地。</div>
    </div>

    <div class="card">
      <div class="kv" style="justify-content:space-between;">
        <div class="actions">
          <button class="btn primary" type="button" data-copy="#out" aria-label="复制输出内容">一键复制</button>
        </div>
        <label style="display:inline-flex;align-items:center;gap:8px;font-weight:500;" for="toggle-wrap">
          <input id="toggle-wrap" type="checkbox" checked style="width:auto;min-height:auto;"/>
          自动换行显示
        </label>
      </div>
      <hr class="sep"/>
      <textarea id="out" class="out mono" style="height:430px;" readonly aria-label="转换输出内容">{{ output }}</textarea>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite">
    <div class="title">提示</div>
    <div class="msg"></div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
